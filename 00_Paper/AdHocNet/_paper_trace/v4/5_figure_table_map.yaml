figures:

  - fig_id: fig:hero
    label: fig:hero
    tex_line: 321
    caption: "Hero figure: LoRaMesher control-plane security before and after patching."
    type: "figure* (double-column)"
    section: sec:intro
    contributions: [C1, C2]
    rq_supported: [RQ1, RQ2]
    content_description: >
      Side-by-side: (left) unauthenticated DV routing with attacker injecting
      forged RouteReply; (right) patched protocol with HMAC verification block.
    status: present

  - fig_id: fig:attack-seq
    label: fig:attack-seq
    tex_line: 949
    caption: "Message sequence diagrams for the two attacks."
    type: figure
    section: sec:attacks
    contributions: [C1]
    rq_supported: [RQ1]
    content_description: >
      Two MSC diagrams: (top) Route Injection — attacker transmits forged
      RouteReply, nodes converge to attacker path; (bottom) Session Replay —
      attacker captures and replays RekeyNotice after epoch advance.
    status: present
    locked_numbers:
      - "DV convergence within ~30 s"
      - "Tamarin counterexample trace verifiable in 0.8 s"

  - fig_id: fig:eval-results
    label: fig:eval-results
    tex_line: 1236
    caption: "PDR degradation across three ad hoc network topologies."
    type: figure
    section: sec:eval
    contributions: [C3]
    rq_supported: [RQ2, RQ3]
    content_description: >
      Bar chart or grouped plot: PDR (%) for baseline/hmac_only/hmac_metricversion
      across linear_6node, tree_8node, grid_9node; under route_injection and replay.
      Shows 0% residual PDR degradation after full patching.
    status: present
    locked_numbers:
      - "baseline linear: 0% PDR"
      - "baseline tree/grid: 77.4% PDR"
      - "patched all topologies: 100% PDR"

