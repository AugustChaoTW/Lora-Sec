        - {key: song2026-protocolguard, venue: "NDSS 2026", tier: T1, location: L1230}
        - {key: shen2026-wifi-security, venue: "NDSS 2026", tier: T1, location: L1235}
        - {key: repetto2022-lorawan-demo, venue: "IEEE WoWMoM 2022", tier: T2, location: L116}
        - {key: sole2026-loramesher-swx, venue: "SoftwareX 2026", tier: T3, location: L116}
