    caption_draft: "Tamarin Lemma Results: Baseline vs. Patched Protocol"
    purpose: "Machine-checked proof results"
    claim_supported: "C2"
    related_rqs: [RQ1, RQ2]
    source_experiments: [E4]
    mentioned_in: [sec:formal]
    exact_numbers:
      baseline_falsified: 4
      patched_proved: 8
      patched_proof_time_s: 3.6

