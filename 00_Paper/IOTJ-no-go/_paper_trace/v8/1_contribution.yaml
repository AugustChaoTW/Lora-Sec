    response_strategy: >
      Emphasize that three qualitatively different topologies
      (pipeline/hierarchical/dense) are evaluated, covering the main
      structural diversity of IoT deployments. Hardware E5b confirms
      core attack/defense behavior on physical boards.

  - contribution_id: C5
    claim: >
      All research artifacts — Tamarin models, ns-3 simulation code,
      patched LoRaMesher firmware, 135 JSON result files, hardware
      experiment code (E5a/E5b), and a pre-configured Docker image —
      are released under MIT license.
    why_it_matters: >
      Reproducibility is a Q1 journal requirement. Open artifacts
