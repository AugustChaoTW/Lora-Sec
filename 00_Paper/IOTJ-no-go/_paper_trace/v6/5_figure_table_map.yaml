  - ft_id: "tab:overhead"
    type: table
    caption_draft: "IoT Network Performance Under Normal Operation (Mean ± Std, 5 Seeds)"
    purpose: "Performance overhead — ≤5 ms, PDR 100%"
    claim_supported: "C3 C4"
    related_rqs: [RQ2, RQ3]
    source_experiments: [E3]
    mentioned_in: [sec:eval]
