      'dst=next-hop' finding introduced in abstract without setup.
      Non-expert reader may not understand why this is surprising.
    tex_line: 48
    evaluators: [E1, E5]

  - priority: CRITICAL
    target: "§7.4 generalization claim (RPL, Meshtastic candidates)"
    concern: >
      After CH16/CH17 fixes, claims lowered to 'design tension'.
      But still claims 'two plausible candidates'. Is this supported?
      Risk: E1 will ask for evidence that RPL/Meshtastic share same encoding.
    tex_line: ~1680
    evaluators: [E1]

  - priority: HIGH
    target: "Tab:tamarin — 5 lemmas baseline vs 8 lemmas patched"
    concern: >
      Asymmetry never explained: why are L6-L8 only in patched model?
      E2 will ask: were these properties not relevant for baseline?
    tex_line: 859
    evaluators: [E2]

  - priority: HIGH
    target: "§6.4 correctness validation philosophy"
    concern: >
      Added in CH17 to address RR3 (6-node testbed).
      Need to verify the argument is coherent: correctness (hardware) vs scale (ns-3).
    tex_line: ~1380
    evaluators: [E3, E5]

  - priority: HIGH
    target: "ASCON mention in §8.5 without comparison"
    concern: >
      'ASCON-AEAD128 provides authenticated encryption competitive with HMAC-SHA256'
      but no data. E4 may ask why ASCON was not evaluated as the patch primitive.
    tex_line: ~1816
    evaluators: [E4]

  - priority: MEDIUM
    target: "E6 hardware: relay_delay_ms=500 explanation"
    concern: >
      500 ms relay delay is artificial and not explained. E3 will ask about this.
    evaluators: [E3]

  - priority: MEDIUM
    target: "MetricVersion counter width and overflow"
    concern: >
      Paper mentions MetricVersion counter but does not specify bit width or overflow behavior.
    evaluators: [E4, E2]

  - priority: MEDIUM
    target: "Paper length (38 pages) vs Ad Hoc Networks norms"
    concern: >
      Ad Hoc Networks typical paper: 10-15 pages (double column, 10pt).
      38 pages preprint format may signal overlength submission.
      Check journal page limit before submission.
    evaluators: [E5]

# ─────────────────────────────────────────────────────────────
# DELPHI ROUND STRUCTURE
# ─────────────────────────────────────────────────────────────
rounds:

  - round_id: R1
    name: "Independent Expert Evaluation"
    method: >
      Each expert evaluates independently. No cross-expert visibility.
      Each issues: ACCEPT / MINOR / MAJOR / REJECT verdict + top 3 issues.
    outputs_per_expert:
      - overall_verdict: "[ACCEPT | MINOR | MAJOR | REJECT]"
      - blocking_issues: "list of issues that would cause MAJOR/REJECT"
      - addressable_issues: "issues fixable before submission"
      - confidence: "0.0–1.0 on their domain coverage"
    target_completion: "delphi_r1.yaml"

  - round_id: R2
    name: "Synthesis and Convergence"
    method: >
      Synthesize R1 outputs. Identify consensus blocking issues (≥3/5 experts flag).
      Identify domain-specific blocking issues (single expert, high severity).
      Produce ranked fix list.
    target_completion: "delphi_r2_synthesis.yaml"

  - round_id: R3
    name: "Fix Verification (Optional)"
    method: >
      After fixes applied, re-evaluate only the flagged sections.
      Confirm blocking issues resolved.
    target_completion: "delphi_r3_verify.yaml"

