high_addressable_issues:

  - fix_id: F5
    severity: HIGH
    title: "Tamarin lemma count inconsistency (paper says 8/8 but structure doesn't match)"
    description: >
      E2_B3: Paper text references L6 MetricVersionMonotonicity, L7 ReplayRejection,
      L8 Executability as patched-only lemmas. But patched_lora_dv_2node.spthy
      has 5 security lemmas + 3 sanity lemmas = 8 total — not labeled L6-L8.
      Lemma names and counts are inconsistent between paper, paper_trace YAMLs,
      and actual .spthy files.
    source_issues: [E2_B3]
    fix: >
      After F1 (model rewrite), reconcile all lemma names between:
      - patched_lora_dv_2node.spthy lemma declarations
      - Table 1 in §4 (tab:tamarin)
      - paper_trace/v4/9_dataset_baseline_protocol.yaml TM2.lemmas
      Assign consistent L1-L8 labels that map 1:1 between model file and paper.
    priority: "FIX WITH F1"

  - fix_id: F6
    severity: HIGH
    title: "E6 relay_delay_ms=500 not explained or justified in paper"
    description: >
      E3_B2: node_relay.ino has a blocking delay(500) inside relay_hello()
      before every Hello re-broadcast. This 500ms blocking window means
      radio ISR cannot process packets during the delay, contributing to
      residual PDR loss. Paper attributes all PDR loss to "near-field channel
      reflections" without mentioning this confound.
    source_issues: [E3_B2, PF3]
    fix: >
      Option A (preferred): Replace blocking delay(500) with non-blocking timer,
      re-run E6 experiment. If PDR improves, report the corrected result.

      Option B (disclosure only): Add to §6.4: "Relay nodes introduce a
      500~ms backoff before re-broadcasting Hellos to reduce collision
      probability on the shared channel. This blocking delay may contribute
      to the 13–15\% residual PDR gap in addition to near-field RF effects."
    priority: "HIGH — resolve with Option A or B before submission"

  - fix_id: F7
    severity: HIGH
    title: "Two-node Tamarin sufficiency argument informal for L3/L4"
    description: >
      E2_B2: The claim "two honest nodes is sufficient for all lemmas" holds
      for L1/L2 but is informal for L3 (RouteConsistency, requires two distinct
      receivers) and L4 (AuthorizedRoutes). The argument is asserted at line 772
      without a bisimulation or monotonicity proof.
    source_issues: [E2_B2]
    fix: >
      Option A: Add 3-node variant of patched model (~20 additional Tamarin lines),
      show L3/L4 still hold. Include as supplementary artifact.
      Option B: Add formal monotonicity argument to §4 explaining why any L3/L4
      counterexample in n-node model projects to the 2-node model.
      Either option strengthens the formal claim significantly.
    priority: "HIGH — attempt before submission"

  - fix_id: F8
    severity: HIGH
    title: "Abstract ~320 words (2× journal norm); contribution hierarchy unclear on first read"
    description: >
      E5_A2: Ad Hoc Networks published abstracts average 150–180 words.
      Current abstract (lines 48-95) has three thesis statements competing for
      primacy: cross-layer finding, authentication claim, validation summary.
      A reader cannot immediately identify which is the primary contribution.
    source_issues: [E5_A2]
    fix: >
      Rewrite abstract to 160–180 words following hierarchy:
      1. Problem (unauthenticated LoRa DV mesh routing)
      2. Finding (route injection = silent black hole, not relay, due to dst-as-next-hop,
         invisible to Tamarin and ns-3, visible only via hardware)
      3. Method (Tamarin + ns-3 + 6 EoRa-PI boards)
      4. Result (HMAC-SHA256 + MetricVersion, 0% residual PDR, artifacts public)
      Drop: deployment-domain enumeration, IDS-design implications, metric enumeration.
    priority: "HIGH — do before submission"

