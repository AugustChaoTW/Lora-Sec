paper_path: /home/augchao/Work/Lora-Sec/00_Paper/AdHocNet/AdHocNet-Aug.tex
paper_stage: draft
target_journal: "Ad Hoc Networks (Elsevier)"

citation_policy:
  style: "elsarticle-num (numeric, [N])"
  note: >
    Verify all DOIs before submission. Ad Hoc Networks requires full journal
    name in references, not abbreviation.

references:

