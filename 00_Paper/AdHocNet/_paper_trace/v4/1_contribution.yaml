paper_path: /home/augchao/Work/Lora-Sec/00_Paper/AdHocNet/AdHocNet-Aug.tex
paper_stage: draft
target_journal: "Ad Hoc Networks (Elsevier)"

main_thesis:
  safe_claim: >
    First formally verified security analysis and patch for a LoRa ad hoc
    mesh routing control plane, validated across formal proofs, simulation,
    and six-board physical testbed.

contributions:
  - contribution_id: C1
    claim: >
      First formal machine-checked security analysis of a LoRa ad hoc mesh
      routing protocol, producing Tamarin counterexample traces for two attack
      classes and proof certificates for the patched protocol (8/8 lemmas).
    rq_ids: [RQ1, RQ2]
    evidence_sections: [sec:attacks, sec:formal]
    evidence_experiments: [E1_tamarin_baseline, E1_tamarin_patched]
    evidence_tables: [tab:tamarin]
    evidence_figures: [fig:attack-seq]
    status: verified
    strongest_defensible_wording: >
      First application of Tamarin Prover to LoRa DV mesh routing; yields
      machine-checked attack traces and security proofs verifiable in <4 s.
    why_it_matters: >
      No prior work has formally analyzed any LoRa mesh routing protocol.
      Machine-checked proofs provide guarantees that informal argument cannot.
    reviewer_risk: >
      Reviewer may claim Tamarin is unnecessary given HMAC simplicity.
      Response: formal model caught the MetricVersion reboot window
      (sec:hardware-nvs) that informal analysis missed; L2 RouteFreshness
      proves MetricVersion counter is strictly necessary beyond HMAC.
    response_strategy: >
      Emphasize that formal model identified the one-reboot attack window
      as a distinct lemma (L2 RouteFreshness) not covered by the HMAC patch
      alone, motivating the MetricVersion counter addition.
    avoid_overclaiming:
      - "Do not claim Tamarin proves the full deployed LoRaMesher codebase secure—only the protocol model."

  - contribution_id: C2
    claim: >
      A 41-line formally verified patch (HMAC-SHA256 + per-destination
      MetricVersion counter) that closes both attack classes with 0.098 ms
      overhead and 2 bytes/entry RAM on ESP32-S3.
    rq_ids: [RQ2, RQ3]
    evidence_sections: [sec:patch]
    evidence_experiments: [E0_hmac_timing, E1_tamarin_patched]
    evidence_tables: [tab:esp32]
    evidence_figures: []
    status: verified
    strongest_defensible_wording: >
      Patch is ESP32-class deployable (measured 0.098 ms, 2 B/entry RAM,
      no PKI) and formally verified to satisfy all four security goals.
    why_it_matters: >
      Existing secure routing patches (ARIADNE, TinySec, authenticated OLSR)
      require asymmetric crypto or PKI, infeasible on 512 KB RAM nodes.
      This is the minimal deployable fix with formal backing.
    reviewer_risk: >
      HMAC + counter is not a novel cryptographic construction.
    response_strategy: >
      Novelty is in the application (first for LoRa DV ad hoc mesh),
      the formal proof (Tamarin verification), and the hardware calibration
      (ESP32-S3 measurement, duty-cycle analysis).
    avoid_overclaiming:
      - "Do not claim to introduce HMAC or monotonic counters as new concepts."

  - contribution_id: C3
    claim: >
      225-run ns-3 simulation study (135 core + 90 scale-validation,
      up to 49 nodes) confirming 0% residual PDR degradation under full
      patching across linear, tree, and grid topologies.
    rq_ids: [RQ2, RQ3]
    evidence_sections: [sec:eval]
    evidence_experiments: [E2_ns3]
    evidence_tables: [tab:attacks, tab:overhead, tab:scale]
    evidence_figures: [fig:eval-results]
    status: complete
    strongest_defensible_wording: >
      27-scenario × 5-seed evaluation across 3 topologies and 2 attack types;
      patch yields 0% PDR degradation vs. unattacked baseline in all scenarios.
    why_it_matters: >
      Validates that the patch does not break DV routing convergence at scale
      (up to 49 nodes) and quantifies attack impact (PDR drop) per topology.
    reviewer_risk: >
      ns-3 uses simplified channel model; may not reflect real LoRa propagation.
    response_strategy: >
      Physical hardware experiments on six boards provide empirical grounding;
      ns-3 provides scale and repeatability that hardware cannot.
    avoid_overclaiming:
      - "ns-3 results are simulation, not field deployment."

  - contribution_id: C4
    claim: >
      Three hardware experiments on six physical EoRa-PI boards confirming
      attack and defense behavior: (i) 3-node injection demo, (ii) 6-node
      multi-hop relay chain, (iii) NVS-persisted MetricVersion reboot-replay
      validation. Cross-layer implementation finding (dst=next-hop) invisible
      to Tamarin and ns-3 discovered via physical boards.
    rq_ids: [RQ2, RQ3]
    evidence_sections: [sec:hardware-validation, sec:hardware-nvs, sec:hardware-e6, sec:cross-layer-finding]
    evidence_experiments: [E3_hardware_e5b, E4_hardware_e5c, E5_hardware_e6]
    evidence_tables: [tab:hw-results, tab:hw-e6]
    evidence_figures: []
    status: complete
    strongest_defensible_wording: >
      Six-board testbed confirms: baseline PDR=0% (complete route poisoning),
      patched PDR=87% (3-node) and 85% (6-node); NVS persistence closes
      reboot replay window; cross-layer dst=next-hop finding is
      invisible to both Tamarin and ns-3.
    why_it_matters: >
      Physical validation uncovered a cross-layer implementation subtlety
      invisible to symbolic and packet-level models, demonstrating hardware
      validation is necessary for ad hoc mesh security studies.
    reviewer_risk: >
      Only 6 nodes; co-located bench may not reflect real deployment.
    response_strategy: >
      Hardware validates security properties (not channel propagation);
      scale coverage provided by ns-3 (up to 49 nodes).
    avoid_overclaiming:
      - "PDR residual 13-15% is channel loss at <1 m bench distance, not a security failure."

  - contribution_id: C5
    claim: >
      Open artifact suite under MIT license: Tamarin models, ns-3 C++17
      module, patched LoRaMesher firmware, Docker reproducibility image,
      and hardware experiment serial logs.
    rq_ids: []
    evidence_sections: [sec:conclusion, app:artifact]
    evidence_experiments: []
    evidence_tables: []
    evidence_figures: []
    status: complete
    strongest_defensible_wording: >
      All artifacts released; Docker image reproduces Tamarin proofs and
      ns-3 runs with single command; firmware applies as drop-in patch to
      LoRaMesher v0.8.x.
    why_it_matters: >
      Enables community adoption, independent replication, and serves as
      baseline for future LoRa mesh routing security research.
    reviewer_risk: Minimal.
    response_strategy: N/A
    avoid_overclaiming: []
