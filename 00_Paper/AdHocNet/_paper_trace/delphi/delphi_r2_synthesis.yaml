# ─────────────────────────────────────────────────────────────
# BLOCKING ISSUES — RANKED (consensus ≥2 experts OR severity CRITICAL)
# ─────────────────────────────────────────────────────────────
blocking_issues:

  - fix_id: F1
    severity: CRITICAL
    consensus_count: 2  # E2_B1 + E4_A4 (same root cause)
    title: "Tamarin MetricVersion model is a no-op — central formal claim unsupported"
    description: >
      patched_lora_dv_2node.spthy: MetricVersion_Increment rule maps
      !MetricVersion(n,n,'v0') → !MetricVersion(n,n,'v0') — identity function.
      The symbol 'v0' never changes. L2_RouteFreshness_Patched therefore proves a
      tautology: 'v0' = 'v0'. Route_Update_Verify also has !Honest(src) as a
      premise, meaning the attacker is EXCLUDED from the rule by construction
      rather than by HMAC verification.

      Consequence: the paper's central formal claim —
      "HMAC alone is insufficient; MetricVersion counter is required for L2" —
      is NOT supported by the Tamarin model as written. The MetricVersion
      counter is nominal, not functional, in the proof.

      This claim is the paper's most-cited novel contribution (abstract para 2,
      §4.2, §6.2, conclusion). If unaddressed, any formal-methods reviewer
      will reject immediately.
    source_issues: [E2_B1, E4_A4]
    tex_lines: [860]
    model_file: "phase2_tamarin_models/patched/patched_lora_dv_2node.spthy"
    fix: >
      (A) In Tamarin model:
        1. Replace hard-coded 'v0' with a genuine successor encoding.
           Option: use succ(x) style or a Fr() nonce-based version counter.
        2. Route_Update_Verify must check that incoming version > stored version
           before firing RouteAccepted — not just check HMAC.
        3. Remove !Honest(src) premise from Route_Update_Verify; security must
           follow from HMAC unforgeability, not from excluding attacker messages.
        4. Re-run Tamarin verification; expect 8/8 to still hold (now meaningfully).
      (B) In paper §4.2:
        Update the prose to accurately describe the actual model encoding.
        The claim "HMAC alone insufficient" must now be supported by a genuine
        Tamarin trace showing a replay succeeds under HMAC-only model.
    priority: "FIX BEFORE SUBMISSION — CRITICAL"

  - fix_id: F2
    severity: CRITICAL
    consensus_count: 2  # E3_B1 (Critical), pre-evaluation PF1
    title: "E6 topology simulation method undisclosed (all-hear-all bench, no actual whitelist in firmware)"
    description: >
      Paper presents E6 as "six-node linear topology" but:
      1. All 6 boards are co-located (<1 m), all can hear each other.
      2. e6_common.h comments mention "software-enforced neighbor whitelist"
         BUT the actual relay firmware has NO whitelist logic — no source filtering.
      3. The "linear topology" emerges from metric arithmetic, not RF range.
      4. Paper never discloses any of this.

      E3 confirms: relay node .ino files have no source-filtering code;
      every relay accepts Hellos from any sender.
      The paper's phrase "five-hop forwarding topology" implies physical
      spatial separation that does not exist.
    source_issues: [E3_B1, PF1]
    tex_lines: [1438, 1443]
    fix: >
      Add one paragraph immediately after the E6 topology description (line 1447):
      "All six boards were co-located at bench distance (<1~m).
      The linear routing behavior emerges from hop-count metric arithmetic:
      each relay re-broadcasts received Hellos with metric\,+\,1,
      so Node~B's Hello (metric\,=\,0) reaches Node~A as metric\,=\,4
      through the chain.
      No source-based packet filtering was applied; all nodes are within RF
      range and accept Hellos from any sender.
      This bench setup validates HMAC authentication logic and multi-relay
      poisoning behavior under realistic firmware scheduling;
      spatial PDR characterization across multi-hop physical distances is
      provided by the ns-3 evaluation (Section~\ref{sec:eval})."
    priority: "FIX BEFORE SUBMISSION — CRITICAL"

  - fix_id: F3
    severity: HIGH
    consensus_count: 2  # E4_B1, pre-evaluation PF2
    title: "MetricVersion uint16 overflow creates ~22-day replay window"
    description: >
      MetricVersion is uint16 (max 65535). At Hello interval 10s:
        65535 × 10s = 7.6 days to exhaust.
      At 30s Hello interval: ~22.8 days.
      After wrap-around, stale counters from previous cycle become "fresh."
      Paper never mentions this. Tamarin model cannot reason about it (v0 is constant).
    source_issues: [E4_B1, PF2]
    tex_lines: [504, 1063]
    fix: >
      Option A (recommended, minimal code change):
        Change uint16_t → uint32_t in firmware (2 bytes extra per route entry = negligible).
        Add one sentence in §6.2: "MetricVersion is declared uint32_t, providing
        4.3×10^9 distinct values — at 10s Hello interval, exhaustion requires
        ~1,360 years, making wrap-around a negligible concern."

      Option B (if uint16 is kept for RAM reasons):
        Add to §6.2 limitations: acknowledge ~7-day exhaust under worst-case,
        recommend operator-configurable reset tied to session rekeying epoch.

      Either way: add a note in §4 (Tamarin scope): "The formal model treats
      MetricVersion as an opaque ordered token; wrap-around under fixed-width
      integer arithmetic is outside the model's scope and addressed in §9."
    priority: "FIX BEFORE SUBMISSION — HIGH"

  - fix_id: F4
    severity: HIGH
    consensus_count: 1  # E4_B2 (single expert but architecturally significant)
    title: "Key architecture mismatch: formal model assumes per-node PSK; firmware uses one group key"
    description: >
      Tamarin model: K = {k_v}_{v ∈ H} — one key per honest node (pairwise interpretation).
      Deployed firmware (e6_common.h): all nodes share identical NETWORK_PSK.
      Paper's k < n/2 compromise bound therefore provides no security margin:
      compromising any single node reveals the group key for all nodes.
    source_issues: [E4_B2]
    tex_lines: [529, 588]
    fix: >
      Explicitly state which architecture the paper assumes:
      (A) If group key is intended (reasonable for LoRa resource constraints):
        Update §2.3 to say "single pre-shared group key k_v shared by all nodes."
        Remove or replace the k < n/2 bound with: "The network remains
        secure against external adversaries until the group key is rotated;
        any node compromise requires network-wide key update."
        Update Tamarin Compromise_Node rule to reflect that compromising
        one node leaks the global psk.
      (B) If pairwise keys are intended:
        Update firmware to use per-node keys and re-run hardware experiments.
    priority: "FIX BEFORE SUBMISSION — HIGH"

