paper_path: /home/augchao/Work/Lora-Sec/00_Paper/AdHocNet/AdHocNet-Aug.tex
paper_stage: draft
target_journal: "Ad Hoc Networks (Elsevier)"

figures:

  - fig_id: fig:attack-sequence
    label: "\\label{fig:attack-sequence}"
    caption_draft: >
      Message sequence diagram for (a) metric spoofing and (b) metric replay
      attacks against LoRaMesher DV routing. Attacker (C) exploits the absence
      of message authentication to inject false route metrics within one DV
      convergence cycle.
    type: sequence_diagram
    produced_by: "TikZ (in LaTeX)"
    status: draft
    used_in_sections: [sec:attacks, sec:formal]
    data_source: "Tamarin counterexample trace (baseline_verification.log)"
    notes: >
      Must show both attack classes. Columns: Node A, Node B (gateway),
      Node C (attacker). Time flows downward. Highlight the unauthenticated
      Hello message that enables injection.

tables:

  - tab_id: tab:lemma-results
    label: "\\label{tab:lemma-results}"
    caption_draft: >
      Tamarin Prover verification results for baseline and patched LoRaMesher
      DV routing protocol models. All eight lemmas verified in the patched model
      (proof time <4 s per lemma).
    type: comparison_table
    status: complete
    used_in_sections: [sec:formal]
    columns:
      - "Lemma ID"
      - "Security Property"
      - "Baseline"
      - "Patched (HMAC only)"
      - "Patched (HMAC + MV)"
    rows:
      - ["L1", "MetricAuthenticity", "FALSIFIED", "✓ verified", "✓ verified"]
      - ["L2", "RouteFreshness", "FALSIFIED", "FALSIFIED", "✓ verified"]
      - ["L3", "RouteConsistency", "FALSIFIED", "✓ verified", "✓ verified"]
      - ["L4", "AuthorizedRoutes", "FALSIFIED", "✓ verified", "✓ verified"]
      - ["L5", "Executability", "✓ verified", "✓ verified", "✓ verified"]
    locked_numbers:
      baseline_falsified: 4
      patched_hmac_only_verified: 4
      patched_full_verified: 5
    notes: >
      L2 RouteFreshness distinguishes HMAC-only from full patch — this is the
      key evidence that MetricVersion counter is necessary.

  - tab_id: tab:constraints
    label: "\\label{tab:constraints}"
    caption_draft: >
      Overhead of HMAC-SHA256 + MetricVersion patch on ESP32-S3FH4R2
      (mbedTLS 2.28, 10,000 iterations). Overhead is negligible relative to
      LoRa link latency and AS923 duty-cycle budget.
    type: measurement_table
    status: complete
    used_in_sections: [sec:patch]
    columns:
      - "Metric"
      - "Value"
      - "Baseline (LoRa link)"
    rows:
      - ["HMAC compute time", "0.098 ms (98.17 µs)", "LoRa airtime: 100–250 ms"]
      - ["RAM per destination entry", "2 bytes (MetricVersion)", "Total: 512 KB"]
      - ["Airtime overhead", "0.06%", "AS923 1% duty-cycle"]
      - ["Code size (patch)", "41 lines (C++)", "—"]
    locked_numbers:
      hmac_mean_us: 98.17
      ram_bytes_per_entry: 2
      airtime_overhead_pct: 0.06
      patch_lines: 41

  - tab_id: tab:attacks
    label: "\\label{tab:attacks}"
    caption_draft: >
      ns-3 simulation results: PDR (%) under three attack types across three
      topologies, comparing baseline (no auth), HMAC-only, and full patch
      (HMAC + MetricVersion). Each cell is the mean over 5 seeds.
    type: results_matrix
    status: complete
    used_in_sections: [sec:eval]
    columns:
      - "Topology"
      - "Attack"
      - "Baseline PDR (%)"
      - "HMAC-only PDR (%)"
      - "Full Patch PDR (%)"
    rows:
      - ["Linear", "Spoofing", "~0", "100", "100"]
      - ["Linear", "Replay", "~0", "100", "100"]
      - ["Linear", "Selective drop", "~50", "100", "100"]
      - ["Tree", "Spoofing", "~0", "100", "100"]
      - ["Tree", "Replay", "~0", "100", "100"]
      - ["Tree", "Selective drop", "~40", "100", "100"]
      - ["Grid", "Spoofing", "~30", "100", "100"]
      - ["Grid", "Replay", "~30", "100", "100"]
      - ["Grid", "Selective drop", "~60", "100", "100"]
    locked_numbers:
      residual_pdr_degradation_pct: 0
    notes: >
      Grid topology shows partial attack resilience in baseline due to path
      redundancy. All topologies reach 100% PDR under full patch.

  - tab_id: tab:hw-results
    label: "\\label{tab:hw-results}"
    caption_draft: >
      Hardware experiment results: 3-node injection testbench (E3). PDR is
      measured over 20 packets per mode.
    type: hardware_results
    status: complete
    used_in_sections: [sec:hardware-validation]
    columns:
      - "Mode"
      - "Node C active?"
      - "PDR (%)"
      - "Notes"
    rows:
      - ["Baseline (no auth)", "Yes", "0", "Route fully poisoned to 0xCC"]
      - ["Patched (HMAC)", "Yes", "87", "13% residual = channel loss"]
      - ["Patched (HMAC)", "No", "~92", "Unattacked channel baseline"]
    locked_numbers:
      baseline_pdr_pct: 0
      patched_pdr_pct: 87

  - tab_id: tab:hw-e6
    label: "\\label{tab:hw-e6}"
    caption_draft: >
      Hardware experiment results: 6-node linear topology (E5 and E6).
      Relay nodes poisoned count indicates how many relay nodes (R1–R3) had
      their next-hop table redirected to the attacker.
    type: hardware_results
    status: complete
    used_in_sections: [sec:hardware-nvs, sec:hardware-e6]
    columns:
      - "Experiment"
      - "Mode"
      - "Relay Nodes Poisoned"
      - "PDR (%)"
      - "Notes"
    rows:
      - ["E4 (NVS)", "Mode 1: HMAC-only", "—", "87", "Replay window open after reboot"]
      - ["E4 (NVS)", "Mode 2: HMAC+NVS", "—", "87", "Replay window closed (mv=21 < stored=32)"]
      - ["E5 (6-node)", "Baseline", "3/4", "0", "R1/R2/R3 all route to 0xCC"]
      - ["E5 (6-node)", "Patched (HMAC)", "0/4", "85", "15% residual = bench channel loss"]
    locked_numbers:
      e6_baseline_poisoned: "3/4"
      e6_patched_poisoned: "0/4"
      e6_patched_pdr_pct: 85
