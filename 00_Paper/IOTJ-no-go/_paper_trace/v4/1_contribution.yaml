    response_strategy: >
      Emphasize that three qualitatively different topologies
      (pipeline/hierarchical/dense) are evaluated, covering the main
      structural diversity of IoT deployments.

  - contribution_id: C5
    claim: >
      All research artifacts — Tamarin models, ns-3 simulation code,
      patched LoRaMesher firmware, 135 JSON result files, and a
      pre-configured Docker image — are released under MIT license.
    why_it_matters: >
      Reproducibility is a Q1 journal requirement. Open artifacts
      enable the community to deploy the patch, reproduce results,
      and extend the formal model to other mesh protocols (Meshtastic).
    strongest_defensible_wording: >
      All primary artifacts are available under MIT license with a
      Docker image pre-installing Tamarin 1.8.0 and ns-3.40 for
      one-command reproducibility.
    confidence: 0.98
    status: complete
