artifact_registry:

  - artifact_id: A1
    name: Tamarin Baseline Model
    file: phase2_tamarin_models/baseline/baseline_lora_dv.spthy
    type: formal_model
    description: >
      Unpatched LoRaMesher DV protocol encoded as Tamarin multiset-rewriting
      rules. 4/5 lemmas falsified (L1–L4); counterexample traces generated
      for all four security violations.
    linked_experiments: [E4]
    linked_contributions: [C2]
    license: MIT
    status: complete

  - artifact_id: A2
    name: Tamarin Patched 2-Node Model
    file: phase2_tamarin_models/patched/patched_lora_dv_2node.spthy
    type: formal_model
    description: >
      Primary patched model with HMAC-SHA256 authentication.
      All 8 lemmas verified in 3.6 seconds.
    linked_experiments: [E4]
    linked_contributions: [C2]
    license: MIT
    status: complete

  - artifact_id: A3
    name: Tamarin Patched with MetricVersion v2
    file: phase2_tamarin_models/patched/patched_lora_dv_with_metrics_v2.spthy
    type: formal_model
    description: >
      Extended model with per-destination MetricVersion counter.
      7/8 lemmas verified (one auxiliary lemma timeout).
    linked_experiments: [E4]
    linked_contributions: [C2]
    license: MIT
    status: complete

  - artifact_id: A4
    name: Tamarin Verification Logs
    file: supplementary/verification/
    type: verification_log
    description: >
      Full Tamarin stdout logs for all three models, plus parsed JSON
      result summaries.
    linked_experiments: [E4]
    linked_contributions: [C2]
    license: MIT
    status: complete

  - artifact_id: A5
    name: ns-3 LoRaMesher Simulation Module
    file: phase4_ns3_simulation/src/
    type: simulation_code
    description: >
      C++17 ns-3.40 module implementing LoRaMesher DV routing (baseline +
      patched + MetricVersion), Dolev-Yao attacker node, three topology
      setups (linear/tree/grid), and metrics collection.
    linked_experiments: [E1, E2, E3]
    linked_contributions: [C4]
    license: MIT
    status: complete

  - artifact_id: A6
    name: ns-3 Experiment Matrix Runner
    file: phase4_ns3_simulation/run_experiment_matrix.py
    type: simulation_script
    description: >
      Python script orchestrating 27 base scenarios × 5 seeds = 135 total
      runs. Generates 135 JSON result files.
    linked_experiments: [E1, E2, E3]
    linked_contributions: [C4]
    license: MIT
    status: complete

  - artifact_id: A7
    name: Simulation Results (135 JSON files)
    file: phase4_ns3_simulation/results/
    type: raw_data
    description: >
      Raw simulation output for all 135 runs (3 topologies × 3 security
      modes × 3 attack types × 5 seeds). Each file contains latency,
      PDR, and attack success metrics.
    linked_experiments: [E1, E2, E3]
    linked_contributions: [C4]
    license: MIT
    status: complete

  - artifact_id: A8
    name: Patched LoRaMesher Firmware
    file: phase4_ns3_simulation/src/routing/loramesh-routing.cc
    type: patch_code
    description: >
      C++ patch implementation: route.cpp (+23 lines HMAC verification)
      and rekeying.cpp (+18 lines MetricVersion counter). The patch is
      guarded by #define PATCH_AUTH for backward compatibility.
    linked_experiments: [E3]
    linked_contributions: [C3]
    license: MIT
    status: complete

  - artifact_id: A9
    name: Docker Image
    file: supplementary/docker/Dockerfile
    type: reproducibility_environment
    description: >
      Pre-configured Docker image with Tamarin 1.8.0 and ns-3.40 installed.
      Enables one-command reproduction of all experiments and formal proofs.
    linked_experiments: [E1, E2, E3, E4]
    linked_contributions: [C5]
    license: MIT
    status: complete

  - artifact_id: A10
    name: ESP32 HMAC Benchmark Script
    file: supplementary/benchmarks/hmac_timing_esp32.py
    type: benchmark_script
    description: >
      Script reproducing the 0.3 ms HMAC-SHA256 timing measurement on
      ESP32-S3 @ 240 MHz using mbedTLS 2.28 (10,000 iterations).
    linked_experiments: [E3]
    linked_contributions: [C3]
    license: MIT
    status: complete
