# ─────────────────────────────────────────────────────────────
# PRE-EVALUATION FINDINGS (2026-05-17)
# Issues discovered during pre-evaluation that must be fed to
# the Delphi panel as known context
# ─────────────────────────────────────────────────────────────
pre_evaluation_findings:

  - finding_id: PF1
    severity: CRITICAL
    title: "E6 topology simulation method not disclosed"
    description: >
      Hardware experiment E6 (6-node linear topology) is conducted with all 6 boards
      co-located on a bench (<1 m RF range), using a software-enforced neighbor
      whitelist in firmware (e6_common.h) to simulate linear topology.
      The paper states only 'six EoRa-PI boards in a five-hop forwarding topology'
      and never explains how the linear topology constraint is enforced when all nodes
      are within radio range of each other.
    evidence: "e6_common.h: 'Software-enforced neighbor whitelist simulates linear topology on bench hardware where all nodes can hear each other'"
    tex_line: 1438
    impact: >
      E3 (hardware expert) will immediately ask: 'If all nodes can hear each other,
      how does the linear routing behavior arise?' The answer (whitelist) is a legitimate
      and common technique, but not disclosing it looks like a methodology gap or omission.
    fix_required: >
      Add one sentence in sec:hardware-e6 setup: 'To enforce the linear topology on
      co-located bench hardware, each node's firmware applies a neighbor whitelist
      accepting only its designated predecessor and successor; nodes outside the
      linear chain are filtered at the MAC acceptance layer, reproducing the
      connectivity graph of a physically separated linear deployment.'

  - finding_id: PF2
    severity: HIGH
    title: "MetricVersion uint16 overflow not addressed"
    description: >
      MetricVersion is defined as uint16 (max 65535). No discussion of overflow behavior
      when counter wraps around. A long-lived node could exhaust the counter space in
      theory. Also: NVS persistence means the counter never resets — is 65535 max
      sufficient for a multi-year deployment? (LoRaMesher Hello interval ~30s →
      65535 * 30s = ~22.8 days before wrap)
    evidence: "line 504: 'uint16 MV'; 30s Hello interval → 65535 / (86400/30) = 22.7 days"
    impact: >
      E4 (security expert) and E2 (formal methods) may flag: MetricVersion wraps in
      ~23 days under normal operation. After wrap, stale metrics from before the last
      wrap become 'fresh'. The Tamarin model may not capture this.
    fix_required: >
      Either: (a) explain why 16 bits is sufficient (e.g., counter is per-destination
      AND increments only on route changes, not every Hello → much slower exhaust);
      OR (b) add a sentence in sec:patch.mv noting the wrap-around limitation and
      that 32-bit upgrade is trivially possible at 4 bytes/entry cost;
      OR (c) add to limitations section.

  - finding_id: PF3
    severity: MEDIUM
    title: "E6 relay_delay_ms=500 not explained in paper"
    description: >
      Experiment YAML (2_experiment.yaml) records relay_delay_ms=500 for E6.
      The paper never mentions this parameter. 500ms relay forwarding delay is
      unusually high and may affect PDR measurements.
    evidence: "2_experiment.yaml: relay_delay_ms: 500"
    impact: >
      E3 will ask about relay delay. If 500ms is a software-imposed delay (to ensure
      sequential logging), it should be disclosed. If it's natural firmware behavior,
      that should be stated.
    fix_required: >
      Add in sec:hardware-e6 setup: explain what relay_delay_ms represents and why
      500ms was chosen (likely: firmware inter-message scheduling gap to prevent
      radio collision in co-located bench setup).

  - finding_id: PF4
    severity: LOW
    title: "PSK in e6_common.h is AES-128 NIST test vector"
    description: >
      The NETWORK_PSK in e6_common.h is 0x2b7e151628aed2a6abf7158809cf4f3c,
      which is the well-known NIST AES-128 key expansion test vector.
      Using a known test vector as PSK in demonstration firmware is acceptable,
      but should be noted to avoid the appearance of using a weak/predictable PSK.
    evidence: "e6_common.h line 53-56"
    impact: >
      Low risk. Paper says 'assumes PSK provisioned at manufacture'. Demo using
      a known test vector is acceptable IF the paper clarifies this is a demo key.
      E4 may note this in review but it's unlikely blocking.
    fix_required: >
      Optional: add note in artifact README that the PSK in demo firmware is
      a test vector; production deployments must use cryptographically random keys.
