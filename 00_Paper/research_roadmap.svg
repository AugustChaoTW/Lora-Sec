  <text x="646" y="830" font-size="9" fill="#58a6ff">B→C: dst=next-hop bug → silent black-hole; HMAC insufficient alone</text>
  <text x="646" y="843" font-size="9" fill="#d2a8ff">B→D: HMAC authenticates; stride-based selective enc reduces payload; AES overhead</text>
  <text x="646" y="856" font-size="9" fill="#ffa657">B→E: 128-d INT8 embedding = 142B packet; SSIM&lt;0.4 no AES needed; DP ε=1.0</text>
  <text x="646" y="869" font-size="9" fill="#d2a8ff">B→F: PCSS = SBC(P) ∧ Φ(P,E)=1; predicts degradation attacks DY cannot</text>
  <text x="646" y="882" font-size="9" fill="#3fb950">E→P03: compression ratio leaks content class → CRIME variant on LoRa</text>
  <text x="646" y="895" font-size="9" fill="#8957e5">D+E→P04: auth video pipeline over multi-hop LoRa mesh</text>
  <text x="646" y="908" font-size="9" fill="#58a6ff">B+C+D+E→P05: survey anchors all findings in LPWAN multimedia security</text>
  <text x="646" y="921" font-size="9" fill="#6e7681">F→all: PCSS framework formally justifies security claims across D, E, C</text>

