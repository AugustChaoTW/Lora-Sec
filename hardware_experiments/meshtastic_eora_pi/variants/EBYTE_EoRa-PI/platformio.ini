; PlatformIO environment for EBYTE EoRa PI
; ESP32-S3FH4R2 (4 MB flash, 2 MB PSRAM) + SX1262 (TCXO 1.6 V)
; Based on env:CDEBYTE_EoRa-S3 from meshtastic/firmware (develop branch)
;
; USAGE:
;   1. Copy this file's [env:EBYTE_EoRa-PI] block into the root platformio.ini
;      of your meshtastic/firmware checkout (or use extra_configs).
;   2. Copy the variant folder (this directory) to
;      firmware/variants/esp32s3/EBYTE_EoRa-PI/
;   3. Copy boards/EBYTE_EoRa-PI.json to firmware/boards/
;   4. Build: pio run -e EBYTE_EoRa-PI

[env:EBYTE_EoRa-PI]
; hw_model 61 = CDEBYTE_EORA_S3 — reuse the same protobuf enum until a
; dedicated upstream hw_model is assigned.  Change when upstreamed.
custom_meshtastic_hw_model      = 61
custom_meshtastic_hw_model_slug = CDEBYTE_EORA_S3
custom_meshtastic_architecture  = esp32-s3
custom_meshtastic_actively_supported = false
custom_meshtastic_display_name  = EBYTE EoRa PI
custom_meshtastic_tags          = EByte
custom_meshtastic_requires_dfu  = true

extends  = esp32s3_base
board    = EBYTE_EoRa-PI
build_flags =
  ${esp32s3_base.build_flags}
  -D EBYTE_EORA_PI
  -I variants/esp32s3/EBYTE_EoRa-PI
