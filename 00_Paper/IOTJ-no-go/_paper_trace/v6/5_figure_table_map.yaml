    related_rqs: [RQ2]
    source_experiments: [E3, E5a]
    mentioned_in: [sec:threat, sec:patch]
    exact_numbers:
      flash_overhead: "+2.1 KB (+0.03%)"
      ram_overhead: "18 B/route entry"
      cpu_overhead_measured: "0.098 ms / 98 µs (E5a hardware)"
      cpu_overhead_vs_airtime: "0.06% of 165 ms LoRa air-time"
    needs_update_if:
      - "Hardware board changes (now Ebyte EoRa PI, ESP32-S3)"
      - "Different mbedTLS version used"

  - ft_id: "tab:tamarin"
