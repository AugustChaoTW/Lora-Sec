entries:
  - ft_id: "fig:attack-overview"
    type: figure
    caption_draft: >
      LoRaMesher IoT mesh attack surface. Left: Route-injection — attacker broadcasts
      forged RouteReply(metric=1). Right: Epoch replay — replayed RekeyNotice(epoch=E).
      Both attacks require only a commodity LoRa transceiver ($18–50).
    purpose: "Establishes the attack surface and motivates the paper"
    claim_supported: "C1"
    related_rqs: [RQ1]
    source_experiments: []
    mentioned_in: [sec:intro]
    exact_numbers: []
    final_values: {}
    presentation_rules: {}
    needs_update_if: []
    text_reference_rule: "Introduced at end of §1.3 contributions list"
    visualization: {type: TikZ, environment: "figure*"}

  - ft_id: "fig:attack-seq"
    type: figure
    caption_draft: >
      Message sequence diagrams for the two attacks. (a) Route injection: attacker sniffs
      Hello broadcasts then injects forged RouteReply(metric=1), causing convergence within
      one DV cycle. (b) Epoch replay: attacker captures RekeyNotice and replays two epochs later.
    purpose: "Concrete protocol-level illustration of both attacks"
    claim_supported: "C1"
    related_rqs: [RQ1]
    source_experiments: [E1, E2]
    mentioned_in: [sec:attacks]
    exact_numbers: ["100% PDR loss (linear)"]
    final_values: {}
    presentation_rules: {}
    needs_update_if: []
    text_reference_rule: "Placed at end of §5 attack analysis"
    visualization: {type: TikZ, environment: figure}

  - ft_id: "fig:eval-results"
    type: figure
    caption_draft: >
      Attack success rates across three IoT deployment topologies. (a) Spoofing: HMAC reduces
      success to 0% universally. (b) Replay: HMAC alone leaves linear fully vulnerable (100%);
      MetricVersion counter achieves 0% across all topologies.
    purpose: "Side-by-side topology comparison confirming both patches are necessary"
    claim_supported: "C4"
    related_rqs: [RQ3]
    source_experiments: [E1, E2, E3]
    mentioned_in: [sec:eval]
    exact_numbers: ["100% spoofing baseline linear", "0% patched all", "100% replay linear HMAC-only", "0% full-patch all"]
    final_values: {}
    presentation_rules: {}
    needs_update_if: []
    text_reference_rule: "Placed after §7.2 attack effectiveness discussion"
    visualization: {type: TikZ, environment: figure, style: "grouped bar chart"}

  - ft_id: "tab:esp32"
    type: table
    caption_draft: "ESP32-S3 Resource Budget for LoRaMesher Security Patch"
    purpose: "Quantifies ESP32 constraints and shows patch overhead is negligible"
    claim_supported: "C3"
    related_rqs: [RQ2]
    source_experiments: [E3]
    mentioned_in: [sec:threat]
    exact_numbers: ["+2.1 KB flash", "18 B/route entry", "0.3 ms/message", "<0.3% LoRa overhead", "<0.1% battery"]
    final_values:
      flash_overhead: "+2.1 KB (+0.03%)"
      ram_overhead: "18 B/route entry"
      cpu_overhead: "0.3 ms/message"
    presentation_rules: {}
