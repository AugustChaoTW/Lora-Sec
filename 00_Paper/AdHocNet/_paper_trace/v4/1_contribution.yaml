main_thesis:
  locked_sentence: >
    Route injection in LoRaMesher creates a silent traffic black hole—not an
    adversarial relay—because the deployed firmware encodes next-hop forwarding
    state in the destination field rather than the final gateway identity assumed
    by symbolic and packet-level analyses. This cross-layer semantic mismatch
    explains the observed topology-dependent attack gradient and only becomes
    visible through hardware-level validation.
  key_implication: >
    Routing-security analysis must explicitly distinguish endpoint identity from
    forwarding-state representation; gateway-centric IDS observes only silence,
    not an attack signature.

contributions:
  - contribution_id: C1
    label: "Cross-Layer Routing Semantics Finding"
    claim: >
      Route injection in LoRaMesher creates a silent traffic black hole—not an
      adversarial relay. The dst field encodes next-hop address; after route
      poisoning, intermediate relay nodes silently drop all packets (dst≠self).
      This is invisible to Tamarin symbolic models and ns-3 simulation; only
      hardware serial logs reveal the correct attack semantics.
    rq_ids: [RQ1, RQ2, RQ3]
    evidence_sections: [sec:intro, sec:cross-layer]
    evidence_experiments: [E3_hardware_e5b, E5_hardware_e6]
    evidence_tables: [tab:dst-semantics, tab:attacks]
    evidence_figures: [fig:hero]
    status: verified
    strongest_defensible_wording: >
      Hardware serial logs reveal that route injection produces a silent black
      hole (dst=0xCC, discarded at every honest relay) not an adversarial relay—
      a finding invisible to symbolic and packet-level analysis.
    why_it_matters: >
      Changes threat model classification: not MITM but availability loss via
      silent misdirection. Gateway-centric IDS cannot detect this attack.
      Explains topology-dependent PDR gradient (0% linear, 77.4% tree/grid)
      as structural consequence of next-hop entry count per path.
    reviewer_risk: >
      R1 (Fatal): Generalization claim ("endemic to constrained mesh design")
      supported only by one case study. Mitigated in 2026-05-12 revision:
      claim lowered to "design tension with two plausible candidates (RPL,
      Meshtastic)" + explicit future work direction.

  - contribution_id: C2
    label: "Three-Tier Verification Methodology That Makes the Finding Visible"
    claim: >
      Progressive verification pipeline: (a) Tamarin formal analysis identifies
      control-plane vulnerability class (4/5 baseline lemmas falsified) and
      verifies lightweight patch (HMAC-SHA256 + NVS-persistent MetricVersion
      counter, 8/8 lemmas, no PKI); (b) ns-3 multi-topology simulation
      quantifies PDR impact across 3 topologies, up to 49 nodes; (c) hardware
      validation on 6 EoRa-PI boards is the only tier capable of revealing the
      dst-as-next-hop encoding and correct attack semantics.
    rq_ids: [RQ1, RQ2, RQ3]
    evidence_sections: [sec:formal, sec:patch, sec:eval, sec:hardware-validation]
    evidence_experiments: [E0_hmac_timing, E1_tamarin_baseline, E1_tamarin_patched,
                           E2_ns3, E3_hardware_e5b, E4_hardware_e5c, E5_hardware_e6]
    evidence_tables: [tab:tamarin, tab:tamarin-mapping, tab:attacks, tab:overhead,
                      tab:hw-e5b, tab:hw-e6]
    evidence_figures: [fig:attack-seq]
    status: verified
    strongest_defensible_wording: >
      Each verification tier reveals a distinct aspect: Tamarin proves protocol
      correctness and verifies the patch; ns-3 quantifies topology-scale PDR
      impact; hardware is the only tier that reveals silent black hole semantics.
    why_it_matters: >
      Demonstrates that hardware validation is not redundant—it is epistemically
      required to establish the correct threat model when firmware forwarding
      semantics differ from symbolic abstractions.
    reviewer_risk: >
      R2: HMAC+counter not novel. Addressed: patch framed as instrument for
      discovering C1, not as independent cryptographic contribution.
      R3: 6-node co-located testbed. Addressed: §6.4 correctness validation
      philosophy added, separating correctness (hardware) from scale (ns-3).
      R4: Tamarin 2-node model. Addressed: explicit scope table added in §3.

  - contribution_id: C3
    label: "Open Reproducible Artifact Suite"
    claim: >
      All Tamarin models (3 .spthy files), ns-3 simulation code (C++17,
      3 topologies, Dolev-Yao attacker), patched LoRaMesher firmware, and
      hardware serial logs released under MIT license.
    rq_ids: []
    evidence_sections: [app:artifact]
    evidence_experiments: []
    evidence_tables: []
    evidence_figures: []
    status: verified
    reviewer_risk: >
      Minor: artifact quality. Mitigated by Docker reproducibility container.

