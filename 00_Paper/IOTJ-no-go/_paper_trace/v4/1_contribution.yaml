        sdk: "ESP-IDF v5.5.4"
        iterations: 10000
        log: "hardware_experiments/E5a_hmac_timing/e5a_result.log"

  - contribution_id: C4
    claim: >
      We validate security effectiveness and performance overhead
      across 135 ns-3 simulation runs: 27 base scenarios
      (3 topologies × 3 protocol states × 3 attack types) × 5 seeds,
      confirming 0% residual attack success and <1% latency overhead.
    why_it_matters: >
      IoT deployments use diverse physical topologies. Multi-topology
      validation demonstrates that the patch generalizes beyond the
      formal model's two-node abstraction to realistic field conditions.
    strongest_defensible_wording: >
      0% attack success rate across all 135 simulation runs with full
      patch; latency overhead ≤5 ms (<1%) on all three topology types
      (linear, tree, grid).
    confidence: 0.90
    status: complete
    rq_ids: [RQ3]
    evidence_experiments: [E1, E2, E3]
    evidence_figures: [fig:eval-results]
    evidence_tables: [tab:attacks, tab:overhead]
    evidence_sections: [sec:eval]
    avoid_overclaiming:
