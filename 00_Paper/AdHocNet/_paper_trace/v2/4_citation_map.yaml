citation_gaps:
  - gap_id: G1
    description: >
      Need at least one reference for formal verification of DV routing protocols
      specifically (not just link-state). If no direct ref exists, cite closest
      work and note gap in related work.
  - gap_id: G2
    description: >
      Ad hoc routing security for LPWAN / low-power mesh is underrepresented
      in literature — this is a gap the paper fills. State explicitly in §2.
  - gap_id: G3
    description: >
      Hardware validation of security patches on ESP32-class LoRa nodes:
      confirm no prior work has this combination. Add to related work gap table.
