medium_issues:

  - fix_id: M1
    title: "Meshtastic Tamarin analysis in §7.4 presented as completed without artifact"
    source: E1_A2
    description: >
      §7.4 describes a Tamarin analysis of Meshtastic routing ("L1–L3 falsified,
      L4 identifies admin-command replay") as if it has equal evidentiary weight
      to the core LoRaMesher result. No Meshtastic Tamarin model is in the artifact.
    fix: >
      Either move Meshtastic analysis to validated supplementary artifact,
      OR reframe as "preliminary informal observation... full treatment future work."

  - fix_id: M2
    title: "SRP / Rushing attacks not cited in §8.3"
    source: E1_A1
    description: >
      Missing canonical MANET security citations: Papadimitratos & Haas 2002 (SRP)
      and Hu, Perrig & Johnson 2003 (rushing attacks). Ad Hoc Networks reviewer will expect these.
    fix: >
      Add 2–3 sentences in §8.3 citing both, noting PKI/source-routing assumptions
      make them inapplicable to LoRaMesher's broadcast DV + ESP32 constraints.

  - fix_id: M3
    title: "Route-table watchdog (§7.3) should cite Watchdog/Pathrater (Marti 2000)"
    source: E1_A4
    description: >
      §7.3 proposes a "route-table watchdog" without citing Marti et al. 2000
      (canonical MANET misbehavior detection paper). Not citing it looks like
      a knowledge gap.
    fix: >
      Add one sentence in §7.3: "This strategy is conceptually related to
      Watchdog/Pathrater~\cite{marti2000-watchdog} but requires no promiscuous
      mode listening — infeasible under LoRa's half-duplex duty-cycle constraints."

  - fix_id: M4
    title: "L2 RouteFreshness in baseline is logically equivalent to L1"
    source: E2_A2
    description: >
      L2 baseline is strictly weaker version of L1 — cannot distinguish replay
      (old seq replayed) from injection (new seq never sent). The "HMAC insufficient"
      claim relies on L2 being a genuine freshness property, but the baseline L2
      cannot be falsified by replay in the intended sense.
    fix: >
      After F1 (model rewrite): ensure L2 baseline includes an ordering or
      freshness premise that can be falsified by timestamp replay.
      OR clarify in paper: "L2 in baseline captures origin-authentication only,
      not anti-replay; replay is demonstrated by hardware experiment E4."
    depends_on: F1

  - fix_id: M5
    title: "Prose fact names (§4) do not match actual Tamarin model fact names"
    source: E2_A1
    description: >
      Paper at lines 804-808 uses fact names (!JoinedMesh, !RouteActive, !RekeyPending)
      that do not appear in either .spthy file. Actual model uses !RouteTable, !MetricVersion.
    fix: >
      Update paper prose to use actual .spthy fact names, OR provide a mapping table.

  - fix_id: M6
    title: "memcmp() timing side-channel in verify_hmac()"
    source: E4_A1
    description: >
      e6_common.h verify_hmac() uses memcmp() (not constant-time) for HMAC tag comparison.
      Exploitable over LoRa is impractical but inconsistent with the paper's attacker model.
    fix: >
      Replace memcmp() with mbedtls_ct_memcmp() in firmware.
      Add one sentence in §6.1 noting constant-time comparison is used.

  - fix_id: M7
    title: "ASCON mention without experimental comparison or design rationale"
    source: E4_A3
    description: >
      §8.5 and §9 mention ASCON (~0.08ms) but provide no source/measurement
      and confate AEAD vs MAC primitives. Reviewer may ask why ASCON was not evaluated.
    fix: >
      Add justification in §6.1: prefer HMAC-SHA256 because
      (a) mbedTLS available by default in ESP-IDF, (b) no confidentiality
      requirement for routing control messages (MAC sufficient), (c) existing
      deployment base. OR run ASCON benchmark and add to Table 1.

  - fix_id: M8
    title: "Hardware subsection placement disrupts narrative arc"
    source: E5_A1
    description: >
      §6.4 (hardware) sits inside §6 (simulation evaluation) but contains C1 finding,
      then §7 expands on it at 193 lines. Reader encounters C1 before its framing.
    fix: >
      Option A: Promote hardware to standalone §6.5 or separate §7, shift cross-layer
      finding to §8. Option B: Reduce §6.4 to 1 page with pointer "see §7 for implications."

  - fix_id: M9
    title: "77.4% PDR gradient lacks graph-theoretic quantification"
    source: E1_A3
    description: >
      The topology-dependent PDR explanation ("structural consequence of next-hop entry count")
      is qualitative. 3×3 grid and tree both show 22.6% degradation but are different topologies.
    fix: >
      Add one paragraph connecting PDR gradient to fraction of routing-table entries
      that include the attacker's position as next-hop. State attacker placement rule
      explicitly (center vs random vs worst-case).

  - fix_id: M10
    title: "ARIADNE comparison incorrectly describes incompatibility reason"
    source: E1_A5
    description: >
      Line 176 says ARIADNE uses "symmetric key pre-distribution schemes incompatible
      with LoRaMesher's join model." Actually ARIADNE uses TESLA (time-based one-way
      function chains) which requires clock synchronization — not available on
      duty-cycled LoRa nodes.
    fix: >
      Replace "symmetric key pre-distribution schemes" with "time-based one-way
      function chains (TESLA) requiring clock synchronization infeasible under
      LoRa's duty-cycle and sleep-cycle constraints."

