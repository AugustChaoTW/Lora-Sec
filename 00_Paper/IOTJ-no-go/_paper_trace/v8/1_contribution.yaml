      - "Result: 98 µs ± 2 µs (0.098 ms) — 0.05% of LoRa 206 ms patched-Hello air-time"
      - "Board correction: Heltec WiFi LoRa 32 V3 was mentioned in earlier drafts; confirmed board is Ebyte EoRa PI"
    reviewer_risk: >
      "HMAC-SHA256 timing is not measured on actual hardware."
      RESOLVED (E5a): Timing measured on real Ebyte EoRa PI (ESP32-S3 @ 240 MHz).
      Result (98 µs) is 3× better than prior mbedTLS 2.28 benchmark (0.3 ms).
    response_strategy: >
      §6.1 states measured value (0.098 ms, 98 µs ± 2 µs) on real
