[env:eora_pi_e20]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

board_build.partitions = partitions_4mb_app3mb.csv
board_upload.flash_size = 4MB
board_upload.maximum_size = 3080192

; ESP32-S3 QIO PSRAM (2MB on EoRa PI)
board_build.arduino.memory_type = qio_qspi

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -O2

monitor_speed = 115200
upload_speed  = 115200
upload_flags  = --no-stub

; No TFLite needed — inference is simulated by delay(6203)
; lib_deps intentionally empty
