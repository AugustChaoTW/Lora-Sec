# ─────────────────────────────────────────────────────────────
# DELPHI PURPOSE
# ─────────────────────────────────────────────────────────────
# Simulate 5 independent expert reviewers matching Ad Hoc Networks
# reviewer profiles. Each evaluates independently (Round 1), then
# issues are synthesized (Round 2) into a prioritized fix list.
#
# Goal: identify BLOCKING issues before submission, not cosmetic fixes.
# ─────────────────────────────────────────────────────────────

panel:

  - expert_id: E1
    role: "Ad Hoc Networks Routing Specialist"
    persona: >
      Professor with 20 years in MANET and wireless mesh routing.
      Deep knowledge of DSDV, AODV, OLSR, DSR, RPL.
      Has reviewed for Ad Hoc Networks (Elsevier) multiple times.
      Expects contributions to generalize beyond one protocol stack.
      Will immediately check if related work covers the canonical papers.
    focus_areas:
      - "Novelty vs existing ad hoc routing security work (SEAD, SAODV, ARIADNE)"
      - "Generalizability of findings beyond LoRaMesher"
      - "C1 (cross-layer finding): strength of claim, evidence quality"
      - "Related work completeness — DSDV, authenticated OLSR, RPL RFC 7416"
      - "77.4% PDR residual: is it meaningful or topology artifact?"
    probe_risks: [RR4, RR5, RR6]
    probe_limitations: [L1, L6]
    known_weaknesses_to_check:
      - "§7.4 generalization: 'design tension with two plausible candidates' — is this convincing?"
      - "sec:related.mesh positioning vs. RPL RFC 7416 and IETF MANET work"
      - "Why LoRaMesher and not BATMAN/OLSR-based LoRa mesh? Missing justification?"
      - "6-hop C1 evidence: only 3-node and 6-node hardware. Generalize claim?"
    questions:
      - "Is C1 (silent black hole vs adversarial relay) a novel finding or an obvious consequence of dst encoding?"
      - "Does sec:related.defense adequately position vs SEAD monotonic hash chains?"
      - "Is 'to our knowledge first formal treatment of DV routing under LoRa constraints' defensible?"
      - "Would the Ad Hoc Networks community care about this result, or does it belong in a narrower IoT venue?"

  - expert_id: E2
    role: "Formal Methods / Protocol Verification Specialist"
    persona: >
      Researcher specializing in Tamarin Prover and ProVerif.
      Has published on TLS 1.3, 5G-AKA, and IoT protocol analysis.
      Will critically examine the Tamarin model for correctness,
      abstractions, scope claims, and reproducibility.
      Suspicious of 2-node models being claimed sufficient for N-node guarantees.
    focus_areas:
      - "Tamarin model correctness and completeness (2-node sufficiency)"
      - "Lemma formulations: are they the right security properties?"
      - "L2 RouteFreshness requiring MetricVersion — is this non-obvious?"
      - "Executability lemma: present in patched model (L8)?"
      - "Reproducibility: can the .spthy file be independently verified?"
    probe_risks: [RR1]
    probe_limitations: [L1, L2]
    known_weaknesses_to_check:
      - "Are lemmas L1-L4 truly 'security goals' or just observable behavior?"
      - "2-node model: Tamarin symbolic = unbounded — does paper argue this correctly?"
      - "L8 Executability: is it in baseline model or only patched? Why asymmetry?"
      - "Tamarin 'falsified' in 0.8 s — is this just because attacker trivially wins? Could mask model errors."
      - "MetricVersion reboot window: is the NVS persistence correctly modeled in Tamarin?"
    questions:
      - "Is the claim 'equivalent to proving for any number of honest nodes' (L1, sec:limitations) correctly stated?"
      - "Does the Tamarin model capture the NVS reboot scenario, or only hardware E4 does?"
      - "Why 8 lemmas in patched vs 5 in baseline — what are the 3 new lemmas and why were they not in baseline?"
      - "Is L2 RouteFreshness the correct Tamarin property for replay prevention? Alternative formulation?"

  - expert_id: E3
    role: "Embedded Systems / LoRa Hardware Expert"
    persona: >
      Engineer with deep knowledge of ESP32, SX1262, and LoRa deployments.
      Has built production LoRa mesh sensor networks.
      Will scrutinize hardware methodology, signal quality, duty cycle claims,
      and real-world deployability of the patch.
      Concerned about co-located 6-board bench vs. real field conditions.
    focus_areas:
      - "Hardware methodology: co-located bench (<1 m) validity"
      - "PDR 87% / 85% residual — channel loss or firmware bug?"
      - "HMAC 98 µs overhead: realistic under ESP32 task scheduling?"
      - "NVS write latency: how long does NVS write take under wear leveling?"
      - "LoRaMesher firmware version compatibility: which version was patched?"
      - "AS923 duty cycle implications for HMAC overhead claim (0.06%)"
    probe_risks: [RR3]
    probe_limitations: [L3, L4]
    known_weaknesses_to_check:
      - "Co-located boards: what is actual inter-board distance? Is RF path multi-hop realistic?"
      - "E6 topology: relay_delay_ms=500 — is this an artificial delay or firmware behavior?"
      - "What firmware version of LoRaMesher was used? Is it the current main branch?"
      - "HMAC overhead 0.06%: assumes ideal airtime. Does CSMA/collision affect this?"
      - "NVS write cost (flash erase cycle): measured or assumed free?"
      - "Patch backward compatibility: what happens if patched node receives unpatched Hello?"
    questions:
      - "Is 87% hardware PDR a success or a concern? Bench-distance explanation convincing?"
      - "Is the LoRaMesher version used representative of current deployments?"
      - "Does the patch break compatibility with production LoRaMesher firmware?"
      - "What is the NVS write overhead per route table update?"

  - expert_id: E4
    role: "Applied Security / Cryptography Expert"
    persona: >
      Security researcher with IoT and lightweight cryptography background.
      Published on embedded MAC authentication, key provisioning, and IoT threat models.
      Will check for security gaps: replay windows, key exhaustion, collision attacks,
      ASCON comparison claims, and completeness of the threat model.
    focus_areas:
      - "HMAC-SHA256 security properties: is it the right primitive for this use case?"
      - "PSK provisioning: paper defers to 'manufacture-time'. Is this realistic?"
      - "Replay window: MetricVersion post-reboot — NVS handles reboot but what about power loss?"
      - "Key exhaustion / compromise: what happens when PSK is leaked?"
      - "Comparison to ASCON-AEAD128 (mentioned in sec:related.lightweight)"
      - "Attacker model completeness: Dolev-Yao on broadcast channel — is this the right model?"
    probe_risks: [RR2]
    probe_limitations: [L5, L6]
    known_weaknesses_to_check:
      - "HMAC with fixed PSK: no key rotation on Hello messages. Long-term key exposure?"
      - "ASCON mention in related work (sec:related.lightweight) without comparison — is this a missed baseline?"
      - "Colluding attacker: paper claims Dolev-Yao equivalent. Is this true for broadcast medium?"
      - "MetricVersion counter: 8-bit or 16-bit? What is the wrap-around scenario?"
      - "MAC truncation: HMAC output length not specified. Full 32 bytes? Truncated?"
    questions:
      - "Is HMAC-SHA256 with a fixed PSK sufficient, or does the paper need to address key rotation?"
      - "Does 'ASCON-AEAD128 provides authenticated encryption competitive with HMAC-SHA256' require a comparison experiment?"
      - "MetricVersion counter: what size? What happens at overflow?"
      - "HMAC-only (Mode 1) accepts replay after reboot. Is this a paper weakness or intentional design?"

  - expert_id: E5
    role: "Associate Editor / Scope & Writing Evaluator"
    persona: >
      Associate Editor for Ad Hoc Networks (Elsevier).
      Evaluates fit for the journal's scope, writing quality, structure,
      and novelty positioning. Will desk-reject if: scope too narrow/IoT-centric,
      novelty claim unsubstantiated, related work incomplete.
      Ad Hoc Networks scope: ad hoc and sensor networks, routing, energy, QoS.
    focus_areas:
      - "Journal scope fit: is this 'ad hoc networks' or 'IoT security'?"
      - "Abstract quality: does it communicate the C1 finding in 150 words?"
      - "Introduction clarity: is the contribution hierarchy (C1 > C2 > C3) clear?"
      - "Length: 38 pages — is this appropriate for the journal?"
      - "Figure 1 (hero figure): redesigned 2026-05-12. Does it serve C1?"
      - "Writing quality: English fluency, passive voice overuse?"
    probe_risks: []
    probe_limitations: []
    known_weaknesses_to_check:
      - "Abstract para 2: patch metrics removed (CH13). Is the remaining content balanced?"
      - "Keywords: contains 'silent traffic black hole' — is this standard terminology?"
      - "38 pages: Ad Hoc Networks typical length 10-15 pages. Is this too long?"
      - "Section §7 (cross-layer finding): added 4 subsections (CH16). Does this disrupt flow?"
      - "Hardware subsections (§6.1-§6.4) interrupt evaluation flow — should hardware be unified?"
      - "Limitations section: after related work (§8). Standard placement or unusual?"
    questions:
      - "Is the paper length (38 pages) appropriate for Ad Hoc Networks? Risk of reject-for-length?"
      - "Does the abstract lead with C1 (finding) or C2 (methodology)? Which is more compelling for this journal?"
      - "Is 'cross-layer semantic mismatch' clearly explained for a routing audience unfamiliar with formal methods?"
      - "Would a non-security Ad Hoc Networks reviewer understand the Tamarin contribution?"

